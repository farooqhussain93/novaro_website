{% extends 'core/base.html' %}

{% block title %}Contact Us | Novaro Systems{% endblock %}

{% block content %}

<!-- Contact Section -->
<section id="contact" class="contact-section">
  <div class="container contact-container">
    <div class="contact-form">
      <h2>Contact us</h2>

      {% if success %}
        <p style="color:#19baa4; text-align:center; font-size:18px; font-weight:600; margin:20px 0;">
          Thank you! Your message was sent successfully.
        </p>
      {% endif %}

      <form method="post" action="">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" placeholder="Message" required style="resize:none; height:200px; max-height:200px; min-height:200px; overflow-y:auto;"></textarea>

        <button type="submit" class="cta-btn">Submit</button>

        <p style="text-align:center; margin:15px 0; color:#666; font-size:14px;">
          Or connect with us directly
        </p>

        <div style="display:flex; align-items:center; justify-content:center; margin-top:10px;">
          <a href="https://wa.me/923303947653?text=Hi%2C%20I%20want%20to%20know%20more%20about%20your%20services"
             target="_blank"
             rel="noopener noreferrer"
             style="display:inline-flex; align-items:center; justify-content:center; background:#19baa4; color:black; text-decoration:none; padding:12px 24px; border-radius:25px; font-weight:600; font-size:16px; transition:all 0.4s cubic-bezier(0.4,0,0.2,1); box-shadow:0 4px 12px rgba(25, 186, 164, 0.3); gap:8px; cursor:pointer;"
             onmouseover="this.style.transform='translateY(-2px) scale(1.04)'; this.style.background='#0c7864'; this.style.color='white'; this.style.boxShadow='0 6px 20px rgba(25, 186, 164, 0.4)'"
             onmouseout="this.style.transform='translateY(0) scale(1)'; this.style.background='#19baa4'; this.style.color='black'; this.style.boxShadow='0 4px 12px rgba(25, 186, 164, 0.3)'">
            <i class="fab fa-whatsapp" style="font-size:20px;"></i>
            <span>Chat with us</span>
          </a>
        </div>
      </form>
    </div>
  </div>
</section>

{% endblock %}
