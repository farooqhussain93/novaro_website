{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}Novaro Systems{% endblock %}</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{% static 'core/images/Novaro_Icon.png' %}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="container nav-container">
      <div class="logo">
        <img src="{% static 'core/images/Logo.png' %}" alt="Novaro Systems Logo" style="height:100px; width:auto; display:block;">
      </div>

      <button class="hamburger" aria-label="Open navigation" style="display:none;">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links">
        <li><a href="{% url 'index' %}">Home</a></li>
        <li><a href="{% url 'about' %}">About us</a></li>
        <li><a href="{% url 'contact' %}">Contact us</a></li>
        <li><a href="{% url 'services' %}">Services</a></li>
        <li><a href="{% url 'portfolio' %}">Portfolio</a></li>
        <li><a href="{% url 'testimonials' %}">Testimonials</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Page Content -->
  {% block content %}
  {% endblock %}

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-container">
      <div class="footer-social">
        <a href="https://www.facebook.com/profile.php?id=61578110485255" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook-f"></i></a>
        <a href="https://x.com/NovaroSystems" target="_blank" rel="noopener noreferrer"><i class="fab fa-twitter"></i></a>
        <a href="https://www.linkedin.com/in/novaro-systems-688954372/" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin-in"></i></a>
        <a href="https://www.instagram.com/novarosystems/" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
        <a href="https://github.com/novaro-systems" target="_blank" rel="noopener noreferrer"><i class="fab fa-github"></i></a>
        <a href="https://www.tiktok.com/@novarosystems" target="_blank" rel="noopener noreferrer"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-upwork"></i></a>
      </div>

      <div class="footer-copy">
        &copy; 2025 Novaro Systems. All rights reserved.
      </div>
    </div>
  </footer>

  <!-- Custom JS -->
  <script src="{% static 'core/js/script.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
